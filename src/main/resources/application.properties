# ============================================
# Vitor Rocha Advocacia - Configuração
# ============================================

server.port=8080

# ---- Banco de Dados H2 (arquivo persistente) ----
spring.datasource.url=jdbc:h2:file:./data/advocacia-db;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Console H2 (desative em produção)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ---- JWT ----
app.jwt.secret=VitorRochaAdvocacia2024SecretKeyMuitoSeguraParaJWT512bits!@#$%^&*
app.jwt.expiration-ms=86400000

# ---- Admin padrão (criado na inicialização) ----
app.admin.email=admin@vitorrocha.adv.br
app.admin.password=Advogado@2024
app.admin.nome=Dr. Vitor Rocha

# ---- Logs ----
logging.level.com.vitorrocha=INFO
logging.level.org.springframework.security=WARN
