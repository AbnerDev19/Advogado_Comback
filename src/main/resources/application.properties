# Porta do servidor
server.port=8080

# Configuração do PostgreSQL
# CORRIGIDO: Usar variável de ambiente para a senha. No terminal, defina: export DB_PASSWORD=suasenha
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/advocaciadb}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configurações JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
# Evita o aviso "Open Session in View" (boa prática)
spring.jpa.open-in-view=false

# CORRIGIDO: Chave JWT fixa (defina via variável de ambiente em produção!)
# Gere uma chave segura com: openssl rand -base64 64
# Em produção: export JWT_SECRET=sua_chave_aqui
jwt.secret=${JWT_SECRET:minha-chave-secreta-super-forte-para-desenvolvimento-local-1234567890}
jwt.expiration=86400000

# Credenciais do admin inicial (altere em produção!)
admin.email=${ADMIN_EMAIL:admin@vitorrochaadv.com.br}
admin.password=${ADMIN_PASSWORD:admin123}
