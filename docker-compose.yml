services:

  # ── Banco de Dados PostgreSQL ──────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: advocacia_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-advocaciadb}
      POSTGRES_USER:     ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-advocaciadb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API Spring Boot ────────────────────────────────────────────────────────
  api:
    build: .
    container_name: advocacia_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Banco de dados
      DB_URL:      jdbc:postgresql://db:5432/${DB_NAME:-advocaciadb}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      # JWT — gere uma chave segura: openssl rand -base64 48
      JWT_SECRET:  ${JWT_SECRET}
      # Credenciais do admin inicial
      ADMIN_EMAIL:    ${ADMIN_EMAIL:-admin@vitorrochaadv.com.br}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}

  # ── Frontend (Nginx serve os arquivos + proxy para API) ────────────────────
  frontend:
    image: nginx:alpine
    container_name: advocacia_frontend
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - ./Site:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
