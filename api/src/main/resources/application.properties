# =====================================================
# Vitor Rocha Advocacia — API Configuration
# =====================================================

# Servidor
server.port=8080

# Banco de dados PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/advogado_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
# "none" porque o schema é gerenciado pelo schema.sql (não pelo Hibernate)
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Inicialização do schema
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:db/schema.sql
spring.sql.init.data-locations=classpath:db/data.sql
spring.jpa.defer-datasource-initialization=true

# JWT
jwt.secret=vitorRochaAdvocaciaSecretKeyParaJWT2024SuperSecreta
jwt.expiration=86400000

# CORS
spring.web.cors.allowed-origins=http://localhost:3000,http://127.0.0.1:5500,file://
