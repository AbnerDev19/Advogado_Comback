server {
    listen 80;
    server_name _;

    # ── Frontend (arquivos estáticos) ──────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    # Qualquer rota que não seja /api/* serve o arquivo estático correspondente
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # ── Proxy da API ───────────────────────────────────────────────────────
    # Toda requisição para /api/* é encaminhada para o container da API
    # Isso resolve o problema de CORS e do "localhost" hardcoded no frontend
    location /api/ {
        proxy_pass         http://api:8080;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts generosos para operações mais lentas
        proxy_connect_timeout 60s;
        proxy_read_timeout    60s;
    }

    # Proxy para o Swagger UI (acessível em /swagger-ui/index.html)
    location /v3/ {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
    }
    location /swagger-ui/ {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
    }

    # Segurança: esconder versão do nginx
    server_tokens off;

    # Compressão gzip para melhor performance
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
}
